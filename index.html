<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSA Quiz - Interactive Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
        }

        .owner-tag {
            position: absolute;
            top: 10px;
            left: 15px;
            color: #000000;
            font-size: 0.75em;
            font-weight: 500;
            z-index: 1000;
            opacity: 0.8;
        }

        .quiz-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            width: 100%;
            padding: 25px;
            animation: fadeIn 0.5s ease-in;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #000000;
            padding-bottom: 12px;
        }

        .header h1 {
            color: #333333;
            font-size: 1.8em;
            margin-bottom: 6px;
        }

        .header p {
            color: #666;
            font-size: 0.9em;
        }

        .progress-section {
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: #ff0000;
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        .question-counter {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            font-weight: 600;
        }

        .question-counter span {
            color: #ff0000;
            font-weight: bold;
        }

        .question-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 5px solid #ff0000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .question-text {
            font-size: 0.95em;
            color: #2c3e50;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            margin-top: 15px;
        }

        .option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            position: relative;
        }

        .option:hover:not(.disabled) {
            border-color: #ff0000;
            transform: translateX(8px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
        }

        .option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #ff0000;
        }

        .option label {
            cursor: pointer;
            flex: 1;
            user-select: none;
            line-height: 1.4;
            font-size: 0.95em;
        }

        .option.selected {
            background: #ffe5e5;
            border-color: #ff0000;
            font-weight: 500;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            border-width: 3px;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            border-width: 3px;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-badge {
            position: absolute;
            right: 15px;
            top: 15px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .option-badge.correct-badge {
            background: #28a745;
            color: white;
        }

        .option-badge.incorrect-badge {
            background: #dc3545;
            color: white;
        }

        .feedback {
            display: none;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-next {
            background: #ff0000;
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            background: #cc0000;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 0, 0, 0.4);
        }

        .btn-prev {
            background: #ff0000;
            color: white;
        }

        .btn-prev:hover:not(:disabled) {
            background: #cc0000;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 0, 0, 0.4);
        }

        .results-container {
            text-align: center;
            display: none;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        .results-title {
            font-size: 2.5em;
            color: #000000;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .results-emoji {
            font-size: 5em;
            margin: 20px 0;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .results-score {
            font-size: 4.5em;
            font-weight: bold;
            margin: 30px 0;
            color: #000000;
        }

        .results-details {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 35px;
            border-radius: 15px;
            margin: 25px 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 18px;
            margin: 12px 0;
            background: white;
            border-radius: 10px;
            font-size: 1.25em;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .result-label {
            color: #000000;
            font-weight: 500;
        }

        .result-value {
            font-weight: bold;
            font-size: 1.3em;
        }

        .result-value.correct {
            color: #28a745;
        }

        .result-value.incorrect {
            color: #dc3545;
        }

        .result-value.total {
            color: #000000;
        }

        .percentage {
            font-size: 1.4em;
            color: #000000;
            margin-top: 15px;
            font-weight: 600;
        }

        .performance-message {
            margin: 25px 0;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 500;
        }

        .performance-message.excellent {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .performance-message.good {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #17a2b8;
        }

        .performance-message.average {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffc107;
        }

        .performance-message.poor {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }

        .btn-restart {
            background: #ff0000;
            color: white;
            padding: 18px 60px;
            margin-top: 30px;
            font-size: 1.1em;
        }

        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.5);
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.7em;
            }

            .question-text {
                font-size: 1em;
            }

            .button-container {
                flex-direction: column;
            }

            .results-score {
                font-size: 3em;
            }

            .results-emoji {
                font-size: 3.5em;
            }
        }

        .quiz-info {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
            display: none;
        }

        .quiz-info.show {
            display: block;
        }

        .quiz-info p {
            margin: 5px 0;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="owner-tag">GitHub: Palamakula-Jashwanth</div>
        <div class="header">
            <h1>Quiz</h1>
            <p>CSA ServiceNow</p>
        </div>

        <div id="quiz-section">
            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress"></div>
                </div>
                <div class="question-counter">
                    Question <span id="current-q">1</span> of <span id="total-q">0</span>
                </div>
            </div>

            <div class="question-box">
                <div class="question-text" id="question"></div>
            </div>

            <div class="options-container" id="options"></div>

            <div class="feedback" id="feedback"></div>

            <div class="button-container">
                <button class="btn btn-prev" id="prevBtn" onclick="previousQuestion()">
                    ← Previous
                </button>
                <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>
                    Next →
                </button>
            </div>
        </div>

        <div class="results-container" id="results">
            <div class="results-emoji" id="resultsEmoji"></div>
            <div class="results-title">Quiz Completed!</div>
            <div class="results-score" id="finalScore"></div>
            <div class="percentage" id="percentage"></div>
            <div class="performance-message" id="performanceMsg"></div>
            <div class="results-details">
                <div class="result-item">
                    <span class="result-label">✅ Correct Answers:</span>
                    <span class="result-value correct" id="correctCount"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">❌ Incorrect Answers:</span>
                    <span class="result-value incorrect" id="incorrectCount"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">📝 Total Questions:</span>
                    <span class="result-value total" id="totalCount"></span>
                </div>
            </div>
            <button class="btn btn-restart" onclick="restartQuiz()">
                🔄 Restart Quiz
            </button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        let currentQuestion = 0;
        let userAnswers = [];
        let correctCount = 0;
        let incorrectCount = 0;
        let answered = false;

        function init() {
            document.getElementById('total-q').textContent = questions.length;
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            const question = questions[currentQuestion];
            
            // Update progress
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
            document.getElementById('current-q').textContent = currentQuestion + 1;
            
            // Update question text
            document.getElementById('question').innerHTML = question.q;
            
            // Load options
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.onclick = () => toggleOption(index);
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `opt${index}`;
                checkbox.value = option.val;
                
                const label = document.createElement('label');
                label.htmlFor = `opt${index}`;
                label.innerHTML = `<strong>${option.val}.</strong> ${option.text}`;
                
                optionDiv.appendChild(checkbox);
                optionDiv.appendChild(label);
                optionsContainer.appendChild(optionDiv);
                
                // Restore previous selection if exists
                if (userAnswers[currentQuestion]) {
                    if (userAnswers[currentQuestion].selected.includes(option.val)) {
                        checkbox.checked = true;
                        optionDiv.classList.add('selected');
                    }
                    if (userAnswers[currentQuestion].submitted) {
                        showResult(userAnswers[currentQuestion]);
                    }
                }
            });
            
            // Update buttons
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            
            // Enable Next button only if user has made a selection and not yet submitted
            if (userAnswers[currentQuestion] && userAnswers[currentQuestion].submitted) {
                document.getElementById('nextBtn').disabled = false;
            } else {
                document.getElementById('nextBtn').disabled = true;
            }
            
            // Hide feedback
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('feedback').className = 'feedback';
        }

        function toggleOption(index) {
            if (answered) return;
            
            const checkbox = document.getElementById(`opt${index}`);
            const optionDiv = checkbox.parentElement;
            
            checkbox.checked = !checkbox.checked;
            
            if (checkbox.checked) {
                optionDiv.classList.add('selected');
            } else {
                optionDiv.classList.remove('selected');
            }
            
            // Enable Next button if at least one option is selected
            const selected = document.querySelectorAll('#options input[type="checkbox"]:checked');
            document.getElementById('nextBtn').disabled = selected.length === 0;
        }

        function showResult(answer) {
            answered = true;
            const options = document.querySelectorAll('.option');
            const correctAnswers = answer.correct;
            
            options.forEach((option, index) => {
                const checkbox = option.querySelector('input[type="checkbox"]');
                const value = checkbox.value.toUpperCase();
                
                option.classList.add('disabled');
                checkbox.disabled = true;
                
                if (correctAnswers.includes(value)) {
                    option.classList.add('correct');
                    const badge = document.createElement('span');
                    badge.className = 'option-badge correct-badge';
                    badge.textContent = '✓ Correct';
                    option.appendChild(badge);
                }
                
                if (checkbox.checked && !correctAnswers.includes(value)) {
                    option.classList.add('incorrect');
                    const badge = document.createElement('span');
                    badge.className = 'option-badge incorrect-badge';
                    badge.textContent = '✗ Wrong';
                    option.appendChild(badge);
                }
            });
            
            // No feedback message needed - colors show correct/incorrect
        }

        function nextQuestion() {
            // If not yet answered, evaluate the answer first
            if (!answered) {
                const selected = [];
                const checkboxes = document.querySelectorAll('#options input[type="checkbox"]:checked');
                checkboxes.forEach(cb => selected.push(cb.value));
                
                if (selected.length === 0) {
                    alert('Please select at least one answer!');
                    return;
                }
                
                // Evaluate the answer
                answered = true;
                const question = questions[currentQuestion];
                const correctAnswers = question.answer.split(',').map(a => a.trim().toUpperCase());
                const selectedAnswers = selected.map(a => a.toUpperCase()).sort();
                
                const isCorrect = JSON.stringify(correctAnswers.sort()) === JSON.stringify(selectedAnswers);
                
                userAnswers[currentQuestion] = {
                    selected: selected,
                    correct: correctAnswers,
                    isCorrect: isCorrect,
                    submitted: true
                };
                
                showResult(userAnswers[currentQuestion]);
                
                // Change button text to "Next →" after evaluation
                document.getElementById('nextBtn').textContent = 'Next →';
                return;
            }
            
            // Move to next question
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion();
                // Reset button text
                document.getElementById('nextBtn').textContent = 'Next →';
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        function showResults() {
            correctCount = 0;
            incorrectCount = 0;
            
            userAnswers.forEach(answer => {
                if (answer && answer.submitted) {
                    if (answer.isCorrect) {
                        correctCount++;
                    } else {
                        incorrectCount++;
                    }
                }
            });
            
            const percentage = Math.round((correctCount / questions.length) * 100);
            
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('results').classList.add('show');
            
            document.getElementById('finalScore').textContent = percentage + '%';
            document.getElementById('percentage').textContent = `You scored ${correctCount} out of ${questions.length}`;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('incorrectCount').textContent = incorrectCount;
            document.getElementById('totalCount').textContent = questions.length;
            
            // Performance message and emoji
            const perfMsg = document.getElementById('performanceMsg');
            const emoji = document.getElementById('resultsEmoji');
            
            if (percentage >= 90) {
                perfMsg.className = 'performance-message excellent';
                perfMsg.textContent = '🌟 Outstanding! You have excellent knowledge of ServiceNow CSA concepts!';
                emoji.textContent = '🏆';
            } else if (percentage >= 75) {
                perfMsg.className = 'performance-message good';
                perfMsg.textContent = '👍 Great job! You have a good understanding of the material!';
                emoji.textContent = '🎉';
            } else if (percentage >= 60) {
                perfMsg.className = 'performance-message average';
                perfMsg.textContent = '📚 Not bad! Review the topics and try again to improve your score!';
                emoji.textContent = '📖';
            } else {
                perfMsg.className = 'performance-message poor';
                perfMsg.textContent = '💪 Keep studying! Review the material and you\'ll do better next time!';
                emoji.textContent = '📝';
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            userAnswers = [];
            correctCount = 0;
            incorrectCount = 0;
            answered = false;
            
            document.getElementById('quiz-section').style.display = 'block';
            document.getElementById('results').classList.remove('show');
            
            init();
        }

        // Initialize quiz on load
        window.onload = init;
    </script>
</body>
</html>
